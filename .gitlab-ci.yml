stages:
  - build
  - package
  - deploy
variables:
  RELEASE_VERSION: "1.0.${CI_PIPELINE_IID}"  
  BUILD_NUMBER: "${CI_PIPELINE_IID}"  
cache:
  paths:
    - node_modules/

build-react:
  stage: "build"
  image: "node:lts-alpine"
  tags:
    - "linux"
  script:
    - echo "Installing dependencies..."
    - npm install --frozen-lockfile 
    - echo "Building React app..."
    - REACT_APP_VERSION="${RELEASE_VERSION}" REACT_APP_BUILD_NUMBER="${BUILD_NUMBER}" npm run build
    - echo "Packaging webapp as tar.gz..."
    - tar -czvf webapp.tar.gz -C build .
  artifacts:
    paths:
      - build
      - webapp.tar.gz

package-publish-jar:
  stage: package
  image: "maven:3.9.9-amazoncorretto-17-alpine"
  only:
    - main
  tags:
    - "linux"
  variables:
    NEXUS_REPO_URL: "https://repo.lirisoft.net/repository/teamsession-app/"
    GROUP_ID: "com.lirisoft.teamsession"
    ARTIFACT_ID: "web-app"
    JAR_FILE: "web-app.jar"  
    MAVEN_CLI_OPTS: "--settings .deploy/settings.xml -DrepositoryId=nexus-repo -Durl=$NEXUS_REPO_URL"
    MVN_DEPOLY_ARGS: "-DgroupId=$GROUP_ID -DartifactId=$ARTIFACT_ID -Dversion=$RELEASE_VERSION -Dpackaging=jar"
  script:
    - 'echo "Extract the file"'
    - 'echo "Manifest-Version: 1.0" > manifest.txt'
    - 'echo "Implementation-Version: ${RELEASE_VERSION}" >> manifest.txt'
    - mkdir -p target/repo/public
    - tar -xvzf webapp.tar.gz -C target/repo/public
    - jar cfm web-app.jar manifest.txt -C target/repo .
    - mvn deploy:deploy-file $MAVEN_CLI_OPTS $MVN_DEPOLY_ARGS -Dfile=$JAR_FILE
    - echo "Publish to Nexus repo ${RELEASE_VERSION}"
